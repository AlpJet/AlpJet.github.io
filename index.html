<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlpJet | Gökyüzünün Yeni Lideri</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --alp-turkuaz: #008B8B;
            --alp-koyu: #1A252C;
            --alp-gri: #F4F7F9;
            --aero-blur: rgba(255, 255, 255, 0.8);
        }

        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', sans-serif;
            background-color: var(--alp-gri);
            scroll-behavior: smooth;
        }

        /* Navigasyon - THY Tarzı Şık */
        nav {
            background-color: var(--alp-koyu);
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            width: 90%;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .logo {
            color: white;
            font-size: 26px;
            font-weight: 900;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo span { color: var(--alp-turkuaz); }

        .nav-links {
            display: flex;
            gap: 20px;
            color: white;
            font-size: 14px;
            font-weight: 700;
            list-style: none;
        }

        /* Hero Alanı - Devasa Başlangıç */
        .hero {
            height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.3)), 
                        url('https://images.unsplash.com/photo-1542296332-2e4473faf563?auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
        }

        .hero h1 {
            font-size: 4rem;
            font-weight: 900;
            margin-bottom: 10px;
            text-shadow: 0 5px 20px rgba(0,0,0,0.5);
        }

        /* Arama Paneli - Aero Glass Efekti */
        .booking-box {
            background: var(--aero-blur);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 15px;
            width: 80%;
            max-width: 1100px;
            margin-top: -80px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
            border: 1px solid rgba(255,255,255,0.4);
            position: relative;
            z-index: 10;
        }

        .input-group label {
            display: block;
            font-size: 11px;
            font-weight: 900;
            color: var(--alp-koyu);
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-weight: 700;
        }

        .search-btn {
            background-color: var(--alp-turkuaz);
            color: white;
            border: none;
            border-radius: 5px;
            font-weight: 900;
            cursor: pointer;
            transition: 0.3s;
        }

        .search-btn:hover { background-color: #006666; transform: scale(1.02); }

    </style>
</head>
<body>

    <nav>
        <a href="#" class="logo">🐺 ALP<span>JET</span></a>
        <ul class="nav-links">
            <li>UÇUŞ PLANLA</li>
            <li>FİLOMUZ</li>
            <li>HAKKIMIZDA</li>
        </ul>
    </nav>

    <div class="hero">
        <h1>ASALET KANATLARINIZDA</h1>
        <p>Bozkurt Gücüyle Dünyayı Keşfedin</p>
    </div>

    <center>
        <div class="booking-box">
            <div class="input-group">
                <label>Nereden</label>
                <input type="text" value="Erzincan (ERC)">
            </div>
            <div class="input-group">
                <label>Nereye</label>
                <input type="text" value="Melun (ORY)">
            </div>
            <div class="input-group">
                <label>Tarih</label>
                <input type="date">
            </div>
            <button class="search-btn">UÇUŞ ARA ✈️</button>
        </div>
    </center>

</body>
</html>
